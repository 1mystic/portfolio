<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initialize Portfolio</title>

<!-- Favicon -->
<link rel="icon" type="image/webp" href="Deployed-now/assets/yoda.webp">
<link rel="apple-touch-icon" href="Deployed-now/assets/yoda.webp">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fira+Code:wght@500;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:           #111111;
    --sage:          #A8A29E;
    --paper:         #F3F1EC;
    --surface:       #FFFFFF;
    --lime-pale:     #D0F0A3;
    --rose-pale:     #FCA5A5;
    --blue-pale:     #BAE6FD;
    --mono: 'Fira Code', monospace;
    --heading: 'Raleway', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background-color: var(--paper); 
    background-image: radial-gradient(var(--sage) 1px, transparent 1px);
    background-size: 20px 20px;
    display: flex; justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
    font-family: var(--heading);
    position: relative;
  }

  /* Decorative Background Shapes */
  .shape {
    position: absolute;
    z-index: -1;
    opacity: 0.7;
  }
  .shape-1 {
    width: 150px; height: 150px;
    background: var(--lime-pale);
    border: 3px solid var(--ink);
    border-radius: 50%;
    top: -50px; right: -50px;
  }
  .shape-2 {
    width: 120px; height: 120px;
    background: var(--rose-pale);
    border: 3px solid var(--ink);
    bottom: -30px; left: -30px;
    transform: rotate(15deg);
  }

  .preloader-content {
    text-align: center;
    padding: 3rem;
    background: var(--surface);
    border: 4px solid var(--ink);
    box-shadow: 12px 12px 0px var(--ink);
    max-width: 900px;
    width: 90%;
    position: relative;
    z-index: 10;
  }

  .preloader-title {
    font-family: var(--heading); 
    font-size: 3rem; 
    color: var(--ink); 
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 0.5rem;
  }
  .preloader-sub {
    font-family: var(--mono); font-size: 14px; color: var(--ink); margin-bottom: 2.5rem; text-transform: uppercase; font-weight: 600;
  }
  .avatars-grid {
    display: flex; gap: 2.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem;
  }
  .avatar-card {
    width: 190px; height: 230px;
    border: 3px solid var(--ink);
    background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    padding: 1.5rem; position: relative;
    color: var(--ink);
    text-decoration: none;
    box-shadow: 6px 6px 0px var(--ink);
  }

  /* Specific Mascot Colors */
  .avatar-card:nth-child(1) { background: #f8fafc; }
  .avatar-card:nth-child(2) { background: #fefce8; }
  .avatar-card:nth-child(3) { background: #fdf2f8; }

  .avatar-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 14px 14px 0px var(--ink);
  }
  .avatar-card:nth-child(1):hover { background: var(--blue-pale); }
  .avatar-card:nth-child(2):hover { background: var(--lime-pale); }
  .avatar-card:nth-child(3):hover { background: var(--rose-pale); }

  .avatar-icon { width: 80px; height: 80px; margin-bottom: 1.5rem; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); stroke-width: 3.5; }
  .avatar-card:hover .avatar-icon { transform: scale(1.2) rotate(8deg); }

  .avatar-label { font-family: var(--heading); font-weight: 800; font-size: 1.4rem; margin-bottom: 4px; text-transform: uppercase;}
  .avatar-desc { font-family: var(--mono); font-size: 12px; font-weight: 600; }

  /* Loading Bar Mockup */
  .loading-bar-container {
    width: 100%;
    height: 30px;
    border: 3px solid var(--ink);
    background: var(--surface);
    margin-top: 1.5rem;
    position: relative;
    overflow: hidden;
    display: flex; align-items: center;
    box-shadow: 4px 4px 0px var(--ink);
  }
  .loading-bar-fill {
    height: 100%;
    width: 65%;
    background: repeating-linear-gradient(
      -45deg,
      var(--lime-pale),
      var(--lime-pale) 15px,
      var(--ink) 15px,
      var(--ink) 30px,
      var(--rose-pale) 30px,
      var(--rose-pale) 45px
    );
    border-right: 3px solid var(--ink);
    animation: loadMove 10s linear infinite;
  }
  .loading-text {
    position: absolute;
    right: 15px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    background: var(--surface);
    padding: 0 5px;
    border-radius: 4px;
  }

  @keyframes loadMove {
    0% { background-position: 0 0; }
    100% { background-position: 250px 0; }
  }

  @media (max-width: 700px) {
    .avatars-grid { gap: 1rem; }
    .avatar-card { width: 140px; height: 180px; }
    .avatar-icon { width: 60px; height: 60px; margin-bottom: 1rem; }
    .preloader-title { font-size: 1.8rem; }
    .preloader-sub { font-size: 12px; margin-bottom: 2rem; }
    .preloader-content { padding: 1.5rem; }
  }

  /* Emphasis for Sigma & Fold */
  .avatar-card.emphasized {
    border-color: var(--ink);
    position: relative;
  }
  .avatar-card.emphasized::before {
    content: 'RECOMMENDED';
    position: absolute;
    top: -12px;
    background: var(--lime-pale);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    box-shadow: 2px 2px 0px var(--ink);
    z-index: 2;
    white-space: nowrap;
  }
  .avatar-card:nth-child(3).emphasized::before {
    background: var(--rose-pale);
    content: 'HOT';
  }
  
  /* De-emphasize Byte slightly */
  .avatar-card:nth-child(1) {
    opacity: 0.85;
    filter: grayscale(0.2);
  }
  .avatar-card:nth-child(1):hover {
    opacity: 1;
    filter: grayscale(0);
  }
  @media (max-width: 700px) {
    .avatar-card.emphasized::before {
      top: -14px;
      font-size: 9px;
      padding: 3px 8px;
    }
  }
</style>
</head>
<body>
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>

  <div class="preloader-content">
    <h1 class="preloader-title">Choose Your Avatar</h1>
    <p class="preloader-sub">Select your companion to enter the portfolio</p>
    <div class="avatars-grid">
      <!-- Navigates directly to the portfolio page -->
      <a href="Deployed-now/index.html" class="avatar-card">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <rect x="25" y="30" width="50" height="50" rx="4" fill="var(--surface)" />
          <line x1="50" y1="30" x2="50" y2="15" />
          <circle cx="50" cy="10" r="4" fill="currentColor" />
          <circle cx="38" cy="48" r="5" fill="currentColor" />
          <circle cx="62" cy="48" r="5" fill="currentColor" />
          <path d="M 38 65 Q 50 72 62 65" stroke-width="4"/>
          <!-- Antennas sideways -->
          <line x1="25" y1="40" x2="15" y2="40" />
          <circle cx="12" cy="40" r="3" fill="currentColor" />
          <line x1="75" y1="40" x2="85" y2="40" />
          <circle cx="88" cy="40" r="3" fill="currentColor" />
        </svg>
        <div class="avatar-label">Byte</div>
        <div class="avatar-desc">The Classic</div>
      </a>
      <a href="update/index.html" class="avatar-card emphasized">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 20 70 L 20 40 L 40 20 L 60 20 L 80 40 L 80 70 Z" fill="var(--surface)" />
          <!-- Owl eyes -->
          <circle cx="35" cy="45" r="14" fill="#fff" />
          <circle cx="65" cy="45" r="14" fill="#fff" />
          <circle cx="35" cy="45" r="4" fill="currentColor" />
          <circle cx="65" cy="45" r="4" fill="currentColor" />
          <path d="M 50 55 L 43 68 L 57 68 Z" fill="currentColor" />
          <!-- Fur details -->
          <path d="M 30 80 L 35 70 L 40 80 M 60 80 L 65 70 L 70 80" />
        </svg>
        <div class="avatar-label">Sigma</div>
        <div class="avatar-desc">Data Scientist</div>
      </a>
      <a href="update-2/projects-cool.html" class="avatar-card emphasized">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <!-- Origami Fox -->
          <polygon points="50,80 15,30 35,15 50,45 65,15 85,30" fill="var(--surface)" />
          <line x1="35" y1="15" x2="50" y2="45" />
          <line x1="65" y1="15" x2="50" y2="45" />
          <line x1="15" y1="30" x2="50" y2="45" />
          <line x1="85" y1="30" x2="50" y2="45" />
          <!-- Fox snout -->
          <polygon points="35,50 65,50 50,80" fill="currentColor" opacity="0.1" />
          <circle cx="50" cy="80" r="5" fill="currentColor" />
          <!-- Eyes -->
          <circle cx="35" cy="55" r="2" fill="currentColor" />
          <circle cx="65" cy="55" r="2" fill="currentColor" />
        </svg>
        <div class="avatar-label">Fold</div>
        <div class="avatar-desc">The Creator</div>
      </a>
    </div>
    
    <div class="loading-bar-container">
      <div class="loading-bar-fill"></div>
      <div class="loading-text">LOADING... 65%</div>
    </div>
  </div>
</body>
</html>
