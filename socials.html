<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATHARV KHARE | @1MYSTIC</title>
  
  <!-- Importing classy serif and playful clean sans-serif fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* --- CSS Variables: Earthy & Minimalist --- */
    :root {
      --bg-color: #f4efe6;        /* Sand / Oatmeal */
      --card-bg: #fdfcf9;         /* Warm Off-White */
      --text-main: #2c3127;       /* Deep Olive / Charcoal */
      --text-muted: #737b67;      /* Muted Sage */
      --accent-color: #92a083;    /* Earthy Sage Green */
      --accent-hover: #d2a17c;    /* Terracotta / Warm Tan accent */
      --shadow-color: rgba(44, 49, 39, 0.08);
      --hover-shadow: rgba(44, 49, 39, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    /* --- Layout --- */
    .container {
      max-width: 440px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* --- Profile Header --- */
    .profile-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--card-bg);
      margin-bottom: 0.5rem;
      box-shadow: 0 8px 24px var(--shadow-color);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .avatar:hover {
      transform: scale(1.08) rotate(-5deg);
    }

    h1 {
      font-family: 'Lora', serif;
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .handle {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* --- Links Stack --- */
    .links-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* --- Individual Cards --- */
    .link-card {
      display: flex;
      align-items: center;
      background-color: var(--card-bg);
      text-decoration: none;
      color: var(--text-main);
      padding: 1rem 1.5rem;
      border-radius: 18px;
      border: 2px solid transparent;
      box-shadow: 0 4px 12px var(--shadow-color);
      
      /* Playful bouncy transition */
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      
      /* Initial state for JS staggered animation */
      opacity: 0;
      transform: translateY(20px);
    }

    .link-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 14px 28px var(--hover-shadow);
      border-color: var(--accent-color);
      color: var(--text-main);
    }

    /* Icon Container */
    .icon-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background-color: rgba(146, 160, 131, 0.15); /* Soft sage bg */
      color: var(--accent-color);
      margin-right: 1.2rem;
      transition: all 0.3s ease;
    }

    .link-card:hover .icon-wrapper {
      background-color: var(--accent-color);
      color: var(--card-bg);
      transform: scale(1.1) rotate(5deg);
    }

    .icon-wrapper svg {
      width: 22px;
      height: 22px;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Link Title */
    .link-title {
      font-size: 1.05rem;
      font-weight: 500;
      flex-grow: 1;
    }

    /* Hover Arrow */
    .arrow {
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      color: var(--accent-hover);
    }

    .link-card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* --- Animations --- */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Links Stack -->

    const container = document.getElementById('links-container');

    // Generating links and applying a staggered animation effect
    linksData.forEach((link, index) => {
      // Create anchor element
      const a = document.createElement('a');
      a.href = link.url;
      a.target = link.url.startsWith('http') ? '_blank' : '_self';
      a.rel = "noopener noreferrer";
      a.className = 'link-card animate-in';
      
      // Calculate stagger delay to create a cascading entrance effect
      a.style.animationDelay = `${(index * 0.08) + 0.3}s`;

      // Card Content
      a.innerHTML = `
        <div class="icon-wrapper">
          ${link.svg}
        </div>
        <span class="link-title">${link.name}</span>
        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  </script>
</body>
