<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initialize Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fira+Code:wght@500;600&family=Raleway:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:           #292524;
    --sage:          #A8A29E;
    --paper:         #FAF9F6;
    --surface:       #FFFFFF;
    --lime-pale:     #F2FCE2;
    --rose-pale:     #FFE4E6;
    --mono: 'Fira Code', monospace;
    --heading: 'Raleway', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    display: flex; justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
    font-family: var(--heading);
  }

  .preloader-content {
    text-align: center;
    padding: 2rem;
  }
  .preloader-title {
    font-family: var(--heading); font-size: 2.5rem; color: var(--ink); margin-bottom: 0.5rem;
  }
  .preloader-sub {
    font-family: var(--mono); font-size: 14px; color: var(--sage); margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .avatars-grid {
    display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap;
  }
  .avatar-card {
    width: 180px; height: 220px;
    border: 2px dashed var(--sage);
    background: var(--surface);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.3s;
    padding: 1rem; position: relative;
    color: var(--ink);
    text-decoration: none;
  }
  .avatar-card:hover {
    border-style: solid; border-color: var(--ink);
    box-shadow: 8px 8px 0px var(--lime-pale);
    transform: translateY(-4px);
  }
  .avatar-card:nth-child(2):hover { box-shadow: 8px 8px 0px var(--rose-pale); }
  .avatar-card:nth-child(3):hover { box-shadow: 8px 8px 0px var(--sage); }

  .avatar-icon { width: 80px; height: 80px; margin-bottom: 1.5rem; transition: transform 0.3s; }
  .avatar-card:hover .avatar-icon { transform: scale(1.1) rotate(5deg); }

  .avatar-label { font-family: var(--heading); font-weight: 700; font-size: 1.2rem; margin-bottom: 4px; }
  .avatar-desc { font-family: var(--mono); font-size: 12px; color: var(--sage); }

  @media (max-width: 600px) {
    .avatars-grid { gap: 1rem; }
    .avatar-card { width: 140px; height: 180px; }
    .avatar-icon { width: 60px; height: 60px; margin-bottom: 1rem; }
    .preloader-title { font-size: 1.8rem; }
    .preloader-sub { font-size: 12px; margin-bottom: 2rem; }
  }
</style>
</head>
<body>
  <div class="preloader-content">
    <h1 class="preloader-title">Initialize System</h1>
    <p class="preloader-sub">Select your companion to enter the portfolio</p>
    <div class="avatars-grid">
      <!-- Navigates directly to the portfolio page -->
      <a href="projects-cool.html?avatar=robot" class="avatar-card">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="25" y="30" width="50" height="50" rx="4" />
          <line x1="50" y1="30" x2="50" y2="15" stroke-dasharray="4 4" />
          <circle cx="50" cy="10" r="3" fill="currentColor" />
          <circle cx="38" cy="48" r="5" fill="currentColor" />
          <circle cx="62" cy="48" r="5" fill="currentColor" />
          <path d="M 40 65 Q 50 70 60 65" />
        </svg>
        <div class="avatar-label">Byte</div>
        <div class="avatar-desc">The Engineer</div>
      </a>
      <a href="projects-cool.html?avatar=owl" class="avatar-card">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 20 70 L 20 40 L 40 20 L 60 20 L 80 40 L 80 70 Z" />
          <circle cx="35" cy="45" r="12" />
          <circle cx="65" cy="45" r="12" />
          <line x1="47" y1="45" x2="53" y2="45" />
          <path d="M 50 55 L 45 65 L 55 65 Z" fill="currentColor" />
          <circle cx="35" cy="45" r="3" fill="currentColor" />
          <circle cx="65" cy="45" r="3" fill="currentColor" />
        </svg>
        <div class="avatar-label">Sigma</div>
        <div class="avatar-desc">Data Scientist</div>
      </a>
      <a href="projects-cool.html?avatar=fox" class="avatar-card">
        <svg class="avatar-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="50,80 10,30 30,10 50,40 70,10 90,30" />
          <line x1="30" y1="10" x2="40" y2="35" stroke-dasharray="4 4" />
          <line x1="70" y1="10" x2="60" y2="35" stroke-dasharray="4 4" />
          <circle cx="50" cy="80" r="4" fill="currentColor" />
          <path d="M 35 55 Q 40 50 45 55" />
          <path d="M 55 55 Q 60 50 65 55" />
        </svg>
        <div class="avatar-label">Fold</div>
        <div class="avatar-desc">The Creator</div>
      </a>
    </div>
  </div>
</body>
</html>
